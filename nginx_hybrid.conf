# 1. HTTP Default (IP Address) - Serve content, NO Redirect
server {
    listen 80 default_server;
    server_name _;
    
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. HTTP Domain - Redirect to HTTPS
server {
    listen 80;
    server_name hardwarestore.duckdns.org;
    return 301 https://$host$request_uri;
}

# 3. HTTPS Domain - Serve content securely
server {
    listen 443 ssl;
    server_name hardwarestore.duckdns.org;
    
    ssl_certificate /etc/letsencrypt/live/hardwarestore.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hardwarestore.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
